# [XSPEC-088] Commit 流程閘門 — UDS 採用版（dogfooding）
name: commit
description: >
  Enforces a 3-step commit workflow on UDS itself: generate message → user
  confirmation → execute. UDS is dogfooding its own /commit-standards Skill via DevAP gate.
steps:
  - id: generate-message
    type: ai-task
    description: "呼叫 /commit-standards Skill 生成 Conventional Commits 格式訊息（雙語）"
    tool: devap:commit-message-generator

  - id: user-confirm
    type: gate
    gate: HUMAN_CONFIRM
    prompt: "確認此 commit message 並執行提交？[y/n]"
    on_reject: generate-message
    requires: [generate-message]

  - id: execute-commit
    type: shell
    command: "git commit -m '{{commit_message}}'"
    requires: [user-confirm]
