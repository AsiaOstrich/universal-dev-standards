# Logging Standards - AI Optimized
# Source: core/logging-standards.md

id: logging
meta:
  version: "1.3.0"
  updated: "2026-05-26"
  source: core/logging-standards.md
  description: Logging levels, structured logging, file rotation policy, and best practices

log_levels:
  ordered:
    - name: TRACE
      code: 10
      use_for: Very detailed debugging
      production: false
    - name: DEBUG
      code: 20
      use_for: Diagnostic information
      production: false
    - name: INFO
      code: 30
      use_for: Normal operations
      production: true
    - name: WARN
      code: 40
      use_for: Potential issues
      production: true
    - name: ERROR
      code: 50
      use_for: Errors needing attention
      production: true
    - name: FATAL
      code: 60
      use_for: Critical failures
      production: true

structured_logging:
  required_fields:
    - timestamp
    - level
    - message
    - service
    - environment
  recommended_fields:
    - trace_id
    - span_id
    - request_id
    - user_id
    - duration_ms
  field_naming: snake_case
  format: JSON in production

sensitive_data:
  never_log:
    - passwords
    - api_keys
    - tokens_full
    - credit_cards
    - ssn
  mask_patterns:
    - "password: '***REDACTED***'"
    - "token: 'tok_...abc'"
    - "card: '****4242'"

rules:
  - id: select-level
    trigger: adding log statement
    instruction: |
      Select appropriate level:
      - DEBUG: Diagnostic only, off in prod
      - INFO: Normal operation completed
      - WARN: Unexpected but recoverable
      - ERROR: Failed operation
      - FATAL: Cannot continue
    priority: required

  - id: structured-format
    trigger: writing logs
    instruction: Use structured JSON logging with required fields
    priority: required

  - id: include-context
    trigger: logging operations
    instruction: Include request_id or trace_id for correlation
    priority: required

  - id: no-sensitive-data
    trigger: logging data
    instruction: Never log passwords, secrets, tokens, or PII
    priority: required

  - id: error-context
    trigger: logging errors
    instruction: Include error_type, error_message, stack, and relevant IDs
    priority: required

  - id: async-logging
    trigger: production deployment
    instruction: Use async/buffered logging for performance
    priority: recommended

  - id: distributed-tracing
    trigger: logging in distributed systems
    instruction: |
      Include OpenTelemetry trace context:
      - trace_id and span_id in every log entry
      - W3C Trace Context propagation (traceparent header)
      - Correlate logs with metrics and traces
    priority: recommended

  - id: observability-pillars
    trigger: designing observability strategy
    instruction: |
      Three pillars: Logs, Metrics, Traces
      - Logs: Discrete events with context
      - Metrics: Aggregated measurements (counters, gauges, histograms)
      - Traces: Request flow across services
      Correlate all three via trace_id/span_id
    priority: recommended

  - id: rotation-dual-trigger
    trigger: configuring file-based log sink
    instruction: |
      File-based log sinks MUST set both rotation triggers:
        1. Time-based: rollingInterval=Day (or equivalent)
        2. Size-based: fileSizeLimitBytes explicit AND rollOnFileSizeLimit=true
      Default size caps are hostile in production — Serilog silently drops at 1 GB
      if rollOnFileSizeLimit is left at default false; log4j / Winston / Python
      RotatingFileHandler likewise drop or grow unbounded without explicit config.
      Recommended starting value: fileSizeLimitBytes=104857600 (100 MB),
      retainedFileCountLimit >= N*7 where N = max expected rolls per day.
    priority: required

  - id: rotation-ops-sop
    trigger: log file size approaching cap
    instruction: |
      If a log file size reaches >= 90% of fileSizeLimitBytes at expected end-of-day,
      INVESTIGATE the cause (noisy retry loop, unbounded debug logging, stack-trace
      flood) BEFORE raising the cap. Raising the cap masks the noise problem.
    priority: required

rotation_policy:
  must_set_both:
    time_based: rollingInterval=Day (or equivalent)
    size_based:
      fileSizeLimitBytes: explicit (100 MB recommended)
      rollOnFileSizeLimit: true
  hostile_defaults:
    serilog: silently stops at 1 GB if rollOnFileSizeLimit=false
    log4j: drops if no SizeBasedTriggeringPolicy
    python_rotatingfilehandler: grows unbounded if maxBytes unset
    winston: drops if maxSize unset
  recommended:
    fileSizeLimitBytes: 104857600
    retainedFileCountLimit_formula: "N * 7 (N = max rolls/day)"
  ops_sop: investigate noise root cause at >= 90% size before raising cap

quick_reference:
  level_selection:
    columns: [Question, Level]
    rows:
      - [Debugging only?, DEBUG]
      - [Normal operation?, INFO]
      - [Unexpected but OK?, WARN]
      - [Operation failed?, ERROR]
      - [Cannot continue?, FATAL]

  required_fields:
    columns: [Field, Format, Required]
    rows:
      - [timestamp, "ISO 8601", Yes]
      - [level, "INFO/ERROR/etc", Yes]
      - [message, String, Yes]
      - [service, String, Yes]
      - [request_id, UUID, Recommended]

  retention:
    columns: [Level, Retention]
    rows:
      - [DEBUG, 7 days]
      - [INFO, 30 days]
      - [WARN, 90 days]
      - [ERROR/FATAL, 1 year]

enforcement:
  hook_type: PostToolUse
  matcher:
    tool: Write
    path: "src/**/*.ts"
  script_ref: "scripts/hooks/check-logging-standard.js"
  severity: warning
  timeout_ms: 500
