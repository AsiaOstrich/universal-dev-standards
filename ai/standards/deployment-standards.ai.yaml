# Deployment Standards (AI-Optimized v1)
# Source: core/deployment-standards.md

standard:
  id: deployment
  name: Deployment Standards
  description: Safe deployment strategies, feature flags, rollback, environment parity, and DORA metrics
  guidelines:
    - "Deploy ≠ Release: separate deployment from user exposure"
    - "Progressive exposure: internal → canary → percentage → GA"
    - "Every deployment must have a tested rollback path (<5 min)"
    - "Automate build, test, deploy, and rollback"

  meta:
    version: "1.1.0"
    updated: "2026-05-13"
    source: core/deployment-standards.md
    description: >
      Safe deployment strategies, feature flags, rollback, environment parity, and DORA metrics.
      v1.1.0: Added environment stratification responsibility matrix and stub server CI/CD
      lifecycle rules (XSPEC-204).

  principles:
    core:
      - deploy_not_release: "Deploying code and exposing to users are separate actions"
      - progressive_exposure: "Roll out to increasingly larger audiences"
      - quick_rollback: "Tested rollback path, executes in <5 min"
      - environment_parity: "Keep dev/staging/prod as similar as possible"
      - automate_everything: "Manual steps are error-prone; automate all"
      - monitor_everything: "Deploy with observability; measure before trusting"

strategies:
  rolling:
    use_case: "Stateless services, standard updates"
    rollback_speed: medium
    resource_cost: low
    complexity: low
  blue_green:
    use_case: "Zero-downtime, database-compatible changes"
    rollback_speed: fast
    resource_cost: high
    complexity: medium
  canary:
    use_case: "High-risk changes, large user base"
    rollback_speed: fast
    resource_cost: medium
    complexity: high
  feature_flag:
    use_case: "Decouple deploy from release, A/B testing"
    rollback_speed: instant
    resource_cost: low
    complexity: medium

feature_flags:
  types:
    release: {lifetime: "days-weeks", example: "enable_new_checkout"}
    experiment: {lifetime: "weeks-months", example: "experiment_pricing_v2"}
    ops: {lifetime: permanent, example: "enable_cache_layer"}
    permission: {lifetime: permanent, example: "feature_premium_export"}
  lifecycle: [create, enable_progressive, monitor, cleanup]
  tech_debt:
    release_flags_max_age: "30 days after full rollout"
    experiment_flags_max_age: "90 days"
    every_flag_must_have: [owner, expiry_date]
    max_flags_per_service: 20

rollback:
  auto_triggers:
    error_rate: {warning: ">1%", auto_rollback: ">5%", window: "5min"}
    p95_latency: {warning: ">2× baseline", auto_rollback: ">3× baseline", window: "5min"}
    health_check: {warning: "1 failure", auto_rollback: "3 consecutive", window: immediate}
  severity_matrix:
    P1: {impact: "Service down, data loss", action: "Immediate rollback", timeline: "<5min"}
    P2: {impact: "Major feature broken", action: "Rollback within window", timeline: "<15min"}
    P3: {impact: "Minor feature broken", action: "Decide rollback or hotfix", timeline: "<1hr"}
    P4: {impact: "Cosmetic issue", action: "Forward-fix next release", timeline: "next deploy"}
  methods:
    - revert_deployment: "Application code issues, <5 min"
    - feature_flag_toggle: "Flag-controlled features, instant"
    - database_rollback: "Schema migration failure, 5-30 min"

environment_parity:
  three_gaps:
    time: "Deploy hours after development, not weeks"
    personnel: "Developers involved in deploying their code"
    tools: "Same backing services everywhere"
  checklist_categories: [infrastructure, application, data, configuration]
  key_rules:
    - "Same build artifacts across environments (build once, deploy everywhere)"
    - "Environment-specific values via environment variables only"
    - "No environment-specific code paths"
    - "Same database engine and version"

dora_metrics:
  deployment_frequency:
    elite: "On-demand (multiple/day)"
    high: "Weekly to monthly"
    medium: "Monthly to semi-annually"
    low: "Semi-annually to annually"
  lead_time:
    elite: "<1 hour"
    high: "1 day to 1 week"
    medium: "1 week to 1 month"
    low: "1 to 6 months"
  change_failure_rate:
    elite: "<5%"
    high: "5-10%"
    medium: "10-15%"
    low: ">15%"
  mttr:
    elite: "<1 hour"
    high: "<1 day"
    medium: "<1 week"
    low: ">1 week"

checklist:
  pre_deploy:
    code_quality: ["All tests pass", "Code review approved", "No critical analysis warnings"]
    security: ["Dependency scan passed", "No secrets in code", "Security headers configured"]
    performance: ["Load testing completed", "No regression detected", "DB query performance verified"]
    database: ["Migration tested on staging", "Rollback migration available", "Backward-compatible schema"]
    config: ["Env vars documented and set", "Feature flags configured", "API compatibility confirmed"]
    readiness: ["Runbook updated", "Rollback procedure tested", "Monitoring dashboards prepared"]
    communication: ["Stakeholders notified", "On-call identified", "Support briefed"]
  post_deploy:
    immediate_5min: ["Health checks 200", "No error logs", "Business metrics unchanged"]
    short_term_1hr: ["Error rate <0.1%", "Response times within SLA", "No support ticket spike"]
    medium_term_24hr: ["Batch jobs successful", "Data consistency verified", "No memory leaks"]
    long_term_1wk: ["Flag cleanup scheduled", "Retrospective completed", "Docs updated"]

# ─────────────────────────────────────────────────────────
# Environment Stratification Responsibility Matrix (v1.1.0)
# ─────────────────────────────────────────────────────────
environment_stratification_matrix:
  rule: >
    Projects with external dependencies MUST build an environment stratification
    responsibility matrix at test-planning time (not at release candidate review).
    This matrix answers: "Which test flows can be fully verified in which environment?"
  when_required: "Any project with external service dependencies (SMS, payment, IdP, messaging, etc.)"
  where: "docs/testing/environment-stratification-matrix.md or in the test plan"

  template: |
    ## Environment Stratification Responsibility Matrix

    | Flow / Feature         | local UAT        | Remote UAT       | PRD                |
    |------------------------|:----------------:|:----------------:|:------------------:|
    | Auth / Login           | ✅ stub IdP      | ✅ Keycloak/AD   | ✅ Enterprise IdP  |
    | SMS Sending            | ⚠️ L2-stub       | ❌ / ⚠️          | ✅ Real + billing  |
    | Payment / Purchase     | ⚠️ L2-stub       | ⚠️ network-dep   | ✅ Real + reconcile|
    | User / Dept Management | ✅               | ✅ cross-machine  | ✅                 |
    | Background Jobs        | ✅ in-process    | ✅               | ✅                 |

    Legend:
    ✅ Full E2E verification possible
    ⚠️ Flow passes through stub/mock — real-world dimensions NOT verified
    ❌ Cannot test in this environment layer

    ### PRD-only verification items (must plan PRD smoke test coverage)
    - SMS billing correctness
    - Payment real debit + bank reconciliation
    - Enterprise AD group sync behavior

  mandatory_rule: >
    This matrix MUST be reviewed at test planning stage alongside
    acceptance-criteria-traceability. It is NOT acceptable to discover
    PRD-only verification items for the first time during release candidate review.

# ─────────────────────────────────────────────────────────
# Stub Server CI/CD Lifecycle Rules (v1.1.0)
# ─────────────────────────────────────────────────────────
stub_server_cicd_rules:
  rationale: >
    Production CI/CD artifacts commonly exclude stub server directories for valid
    security reasons (e.g., MockSoap/, tests/stub-server/ excluded from build.ps1).
    Without explicit rules, this creates an undocumented "UAT cannot test X" situation
    that is discovered too late in the release cycle.

  build_time:
    rules:
      - "Production artifact MUST exclude all stub server code directories"
      - "Exclusion rule MUST be documented in docs/uat/STUB-EXCLUSION-RATIONALE.md"
      - "CI build verification step MUST confirm stub directories are absent from artifact"
    example_ps1: |
      # build.ps1 — explicit exclusion with documentation comment
      # Stub server excluded from production artifact (see docs/uat/STUB-EXCLUSION-RATIONALE.md)
      # Consequence: UAT machine cannot run SMS/MMS flow without sidecar deployment (see Option A below)
      $exclude = @("MockSoap", "tests/stub-server", "test-fixtures")

  uat_deployment:
    rule: "Choose Option A or Option B; document the choice; do NOT leave it undocumented"
    options:
      option_a_sidecar_deploy:
        name: "Sidecar Deployment (Recommended)"
        description: >
          Stub server deployed as separate process to UAT machine;
          application configured via env var to reach the stub endpoint.
        benefit: "Decoupled from app artifact; independently updatable"
        example_github_actions: |
          deploy-stub-server:
            environment: uat
            steps:
              - name: Deploy stub server to UAT
                run: |
                  ssh uat-machine "cd /opt/stub-server && pm2 start server.js --name stub-server"
              - name: Configure app to use stub
                run: echo "SMS_ENDPOINT=http://uat-machine:9999/soap" >> $GITHUB_ENV
        example_gitlab_ci: |
          deploy-stub-server:
            stage: deploy
            environment: uat
            script:
              - ssh uat-machine "pm2 start tests/stub-server/server.js --name stub-server"
            only: [uat-branch, tags]

      option_b_prd_smoke_deferral:
        name: "PRD Smoke Deferral"
        description: >
          Document which flows cannot be tested in UAT; explicitly mark them as
          PRD-smoke-only items. These items must appear in the environment stratification matrix.
        requirement: "Must be reflected as ❌ in environment stratification matrix with PRD smoke plan"

  prd_prohibitions:
    - "MUST NOT deploy or run stub servers in PRD environment"
    - "MUST NOT include stub server code in PRD artifact"
    - "MUST NOT allow network access to stub server endpoints from PRD"

  forbidden_state: >
    It is NEVER acceptable to have "no stub server AND no real service AND no documented
    deferral" for a testable flow. Every flow must be either:
    (a) fully testable in UAT via real service or Level 2 stub server, OR
    (b) explicitly documented as PRD-smoke-only with a smoke test plan.

physical_spec:
  type: custom_script
  validator:
    command: "test -f Dockerfile || test -f .github/workflows/*.yml || test -f Jenkinsfile || test -f .gitlab-ci.yml"
    rule: "deployment_pipeline_configured"
