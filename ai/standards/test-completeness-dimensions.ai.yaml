# Test Completeness Dimensions - AI Optimized
# Source: core/test-completeness-dimensions.md

id: test-completeness-dimensions
meta:
  version: "1.3.0"
  updated: "2026-05-13"
  source: core/test-completeness-dimensions.md
  description: >
    Framework for evaluating test completeness across 11 dimensions.
    v1.3.0 adds Dimension 11: Environment Verifiability (XSPEC-204).

dimensions:
  - id: 1
    name: Happy Path
    description: Normal expected behavior with valid inputs
    test_items:
      - Valid input produces expected output
      - Success status codes/responses
      - Data is correctly created/modified
      - Side effects occur as expected

  - id: 2
    name: Boundary Conditions
    description: Values at the edges of valid ranges
    test_items:
      - Minimum valid values
      - Maximum valid values
      - Just below minimum (invalid)
      - Just above maximum (invalid)
      - Empty collections vs single item vs many items

  - id: 3
    name: Error Handling
    description: Invalid inputs and exceptional conditions
    test_items:
      - Invalid input formats
      - Missing required fields
      - Duplicate data conflicts
      - Resource not found
      - External service failures

  - id: 4
    name: Authorization
    description: Role-based access control for each operation
    test_items:
      - Each role's permitted operations
      - Each role's denied operations
      - Unauthenticated access
      - Cross-tenant/cross-user data access
    note: Create authorization matrix for each feature

  - id: 5
    name: State Changes
    description: System state before and after operations
    test_items:
      - State before operation
      - State after operation
      - State transitions (enabled → disabled)
      - Idempotency (repeating operation has same result)

  - id: 6
    name: Validation Logic
    description: Business rules and format validation
    test_items:
      - Format validation (email, phone, etc.)
      - Business rule validation
      - Cross-field validation
      - Domain-specific constraints

  - id: 7
    name: Integration Verification
    description: Actual database queries and external integrations
    test_items:
      - Query predicates return correct data
      - Entity relationships correctly loaded
      - Pagination works correctly
      - Sorting and filtering work correctly
    when_required: If unit test uses wildcard matchers (It.IsAny<>, any(), Arg.Any<>)

  - id: 8
    name: AI Test Generation Quality
    description: Evaluate quality and effectiveness of AI-generated tests
    test_items:
      - Tests verify meaningful behavior (not just obvious getters/setters)
      - Assertions are specific (not just "not null")
      - Tests are independent and self-contained
      - Mutation score > 80% (if evaluated)
    when_required: When tests are AI-generated
    quality_criteria:
      test_purpose: Tests business logic and edge cases (not obvious operations)
      assertion_depth: Verifies specific values and states
      independence: Each test is self-contained
      naming: Descriptive names (should_reject_invalid_email)
      coverage_intent: Covers all code paths meaningfully

  - id: 9
    name: Flow Completeness
    description: At least one complete path from initial state to each terminal state exists
    test_items:
      - Happy path flow covers all steps in sequence with shared context
      - Each failure terminal state has at least one flow test that reaches it
      - Shared context (state) is verified at each intermediate step, not only the final step
      - Preconditions are explicitly established, not assumed from previous test runs
    when_required: When feature has 3 or more sequential steps
    note: See flow-based-testing.ai.yaml for the full 3-step flow decomposition methodology

  - id: 10
    name: Branch Coverage
    description: Each decision point in a flow has all branches covered by at least one scenario
    test_items:
      - Every if/else branch has a corresponding test scenario
      - Each distinct error branch (not just the "main" error) has its own test
      - Decision table applied with minimum Each-Choice coverage strategy
      - Critical flows (auth / payment / license / security) use All-Combinations strategy
    when_required: When flow has any conditional logic or decision points
    note: Use decision_table_expansion from flow-based-testing.ai.yaml to enumerate scenarios

  - id: 11
    name: Environment Verifiability
    description: >
      For each AC with external service dependencies, document which environment layer
      can fully verify it, and plan PRD-smoke coverage for items that cannot be verified in UAT.
    test_items:
      - Environment stratification responsibility matrix exists for features with external dependencies
      - Each AC is tagged with its minimum verifiable environment layer (local / UAT / PRD)
      - ACs that are PRD-only are explicitly tracked and have a PRD smoke test plan
      - Evidence for externally-dependent ACs includes environment_layer field
    when_required: >
      Any feature with external service dependencies (SMS, payment, IdP, email,
      SOAP integrations, external REST APIs)
    note: See multi-environment-e2e-testing.ai.yaml and deployment-standards.ai.yaml for environment capability matrix templates

feature_type_mapping:
  note: "Dimension 8 (AI Generation Quality) applies when tests are AI-generated"
  types:
    - type: CRUD API
      dimensions: [1, 2, 3, 4, 6, 7]
      with_ai: [1, 2, 3, 4, 6, 7, 8]

    - type: Query/Search
      dimensions: [1, 2, 3, 4, 7]
      with_ai: [1, 2, 3, 4, 7, 8]

    - type: State Machine
      dimensions: [1, 3, 4, 5, 6]
      with_ai: [1, 3, 4, 5, 6, 8]

    - type: Validation
      dimensions: [1, 2, 3, 6]
      with_ai: [1, 2, 3, 6, 8]

    - type: Background Job
      dimensions: [1, 3, 5]
      with_ai: [1, 3, 5, 8]

    - type: External Integration
      dimensions: [1, 3, 7, 11]
      with_ai: [1, 3, 7, 8, 11]
      note: Dimension 11 required for any external service dependency

    - type: Workflow / Multi-step Process
      dimensions: [1, 3, 4, 5, 9, 10]
      with_ai: [1, 3, 4, 5, 9, 10, 8]
      required_pattern: journey-chained-test
      note: Apply flow-based-testing standard; use shared ctx; Each-Choice minimum branch coverage

    - type: External-Dependent Workflow
      dimensions: [1, 3, 4, 5, 9, 10, 11]
      with_ai: [1, 3, 4, 5, 9, 10, 8, 11]
      note: Combines Workflow + External Integration; Dimension 11 mandatory

error_code_coverage:
  - code: 200
    meaning: Success
    scenario: Happy path test

  - code: 400
    meaning: Bad Request
    scenario: Invalid format, missing fields

  - code: 401
    meaning: Unauthorized
    scenario: Invalid/missing token

  - code: 403
    meaning: Forbidden
    scenario: Valid token, insufficient permissions

  - code: 404
    meaning: Not Found
    scenario: Non-existent resource

  - code: 409
    meaning: Conflict
    scenario: Duplicate data

  - code: 422
    meaning: Unprocessable
    scenario: Business rule violation

  - code: 500
    meaning: Server Error
    scenario: Exception handling

anti_patterns:
  - Testing only happy path
  - Missing authorization tests for multi-role systems
  - Not verifying state changes
  - Using wildcards in UT without corresponding IT
  - Same values for ID and business identifier in test data
  - Testing implementation details instead of behavior
  - Accepting AI-generated tests without review
  - Assuming high line coverage means effective tests
  - Skipping mutation testing for critical code
  - Testing all steps in a multi-step flow independently without state threading (misses step interaction bugs)
  - Using a single test case for a flow with multiple decision points (hides which branch failed)
  - Resetting shared context between steps in journey tests (breaks state accumulation)
  - Applying All-Combinations to every flow (unmaintainable; reserve for critical auth/payment/security paths)

rules:
  - id: use-checklist
    trigger: designing tests for a feature
    instruction: Use the 11 dimensions checklist to ensure completeness (dim 8 for AI-generated tests; dim 9/10 for multi-step workflows; dim 11 for external dependencies)
    priority: required

  - id: authorization-matrix
    trigger: feature has role-based access
    instruction: Create authorization matrix with test for each cell
    priority: required

  - id: integration-for-wildcards
    trigger: unit test uses wildcard matchers
    instruction: Must have corresponding integration tests
    priority: required

  - id: cover-error-codes
    trigger: API returns error codes
    instruction: Each error code should have a test scenario
    priority: required

  - id: review-ai-tests
    trigger: tests are AI-generated
    instruction: Apply dimension 8 quality criteria; verify meaningful assertions
    priority: required

checklist_template: |
  Feature: ___________________

  □ Happy Path
    □ Valid input produces expected success
    □ Correct data is returned/created
    □ Side effects occur as expected

  □ Boundary Conditions
    □ Minimum valid value
    □ Maximum valid value
    □ Empty/single/large collection

  □ Error Handling
    □ Invalid input format
    □ Missing required fields
    □ Duplicate/conflict scenarios
    □ Not found scenarios

  □ Authorization
    □ Each permitted role tested
    □ Each denied role tested
    □ Unauthenticated access tested

  □ State Changes
    □ Initial state verified
    □ Final state verified
    □ All valid transitions tested

  □ Validation
    □ Format validation
    □ Business rule validation
    □ Cross-field validation

  □ Integration (if UT uses wildcards)
    □ Query predicates verified
    □ Entity relationships verified
    □ Pagination/sorting verified

  □ AI Generation Quality (if AI-generated)
    □ Tests verify meaningful behavior
    □ Assertions are specific (not just "not null")
    □ Tests are independent and self-contained
    □ Mutation score > 80% (if evaluated)

  □ Flow Completeness (for multi-step features, 3+ steps)
    □ Happy path journey test covers all steps in sequence
    □ Each failure terminal state has a flow test reaching it
    □ Intermediate step state verified in ctx, not only final result
    □ Preconditions explicitly set up before Step 1

  □ Branch Coverage (for flows with conditional logic)
    □ Decision table created with all decision points and values
    □ Each-Choice minimum coverage applied
    □ Each distinct error branch has its own describe block
    □ Critical flows (auth/payment/security) use All-Combinations

  □ Environment Verifiability (for features with external dependencies)
    □ Environment stratification matrix created/updated
    □ Each AC tagged with minimum verifiable environment layer
    □ PRD-only ACs documented with smoke test plan
    □ Evidence includes environment_layer field for externally-dependent ACs

