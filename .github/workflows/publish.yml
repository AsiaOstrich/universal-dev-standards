name: Publish to npm

on:
  release:
    types: [published]

jobs:
  clean-room-install:
    name: Clean-room Install Test (XSPEC-221)
    runs-on: ubuntu-latest
    container:
      image: node:20-alpine

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # XSPEC-221 hotfix: `npm install -g .` does NOT install transitive deps in
      # alpine clean-room environments (deps must exist before -g symlink). v5.13.0
      # release surfaced this when the gate first ran against a real release.
      - name: Install dependencies (required before -g install)
        working-directory: cli
        run: npm ci --ignore-scripts
        env:
          HUSKY: '0'

      - name: Install UDS globally from source
        working-directory: cli
        run: npm install -g .

      - name: Verify uds --version
        run: uds --version

      - name: Verify uds list (≥10 standards, no errors)
        run: |
          output=$(uds list 2>&1)
          echo "$output"
          count=$(echo "$output" | grep -c "^")
          [ "$count" -ge 10 ]
          echo "$output" | grep -qv "Error\|Cannot find module"

      # XSPEC-221 hotfix v2: `uds init` does not implement --dry-run (only --help
       # works as a safe non-mutating verification). Verifying --help reaches its
       # exit code 0 confirms the init command is wired correctly.
      - name: Verify uds init command exists (--help)
        run: uds init --help > /dev/null

  publish:
    name: Publish to npm
    needs: [clean-room-install]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          # No `registry-url`: it writes an empty //registry.npmjs.org/:_authToken
          # to .npmrc, which suppresses OIDC trusted publishing (npm takes the
          # empty-token path → ENEEDAUTH/E404). Without it npm engages OIDC.
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      # OIDC trusted publishing requires npm >= 11.5.1 (newer than the bundled npm).
      - name: Upgrade npm for OIDC
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install --ignore-scripts
        env:
          HUSKY: '0'

      # Pre-release validation checks
      - name: Run version sync check
        working-directory: .
        run: ./scripts/check-version-sync.sh

      - name: Run standards sync check
        working-directory: .
        run: ./scripts/check-standards-sync.sh

      - name: Run linting
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: Verify CLI
        run: node bin/uds.js --version

      - name: Determine npm tag
        id: npm-tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if echo "$VERSION" | grep -qE '\-beta\.'; then
            echo "tag=beta" >> $GITHUB_OUTPUT
            echo "Publishing version $VERSION with tag: beta"
          elif echo "$VERSION" | grep -qE '\-alpha\.'; then
            echo "tag=alpha" >> $GITHUB_OUTPUT
            echo "Publishing version $VERSION with tag: alpha"
          elif echo "$VERSION" | grep -qE '\-rc\.'; then
            echo "tag=rc" >> $GITHUB_OUTPUT
            echo "Publishing version $VERSION with tag: rc"
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "Publishing version $VERSION with tag: latest"
          fi

      # OIDC trusted publishing: npm authenticates via this job's id-token against
      # the trusted publisher configured on npmjs (universal-dev-standards →
      # Settings → Trusted Publisher: AsiaOstrich / universal-dev-standards /
      # publish.yml). No NODE_AUTH_TOKEN secret needed; provenance is automatic.
      - name: Publish to npm
        run: npm publish --provenance --access public --tag ${{ steps.npm-tag.outputs.tag }}
