name: Docs Index Check

# XSPEC-355: this workflow was pull_request-only, but the repo commits direct to
# main (0 merges in 345 commits over three months), so it had never run. Also
# added skills/commands/*.md — COMMANDS-INDEX.md is generated from those, and the
# original path list only covered skills/*/SKILL.md.
# NOTE: paths are duplicated below on purpose — GitHub Actions does not support
# YAML anchors/aliases in workflow files. Keep the two lists in sync.
on:
  pull_request:
    paths:
      - 'uds-manifest.json'
      - 'skills/*/SKILL.md'
      - 'skills/commands/*.md'
      - 'cli/standards-registry.json'
      - 'scripts/generate-skill-index.ts'
  push:
    branches: [main]
    paths:
      - 'uds-manifest.json'
      - 'skills/*/SKILL.md'
      - 'skills/commands/*.md'
      - 'cli/standards-registry.json'
      - 'scripts/generate-skill-index.ts'

jobs:
  check-docs-index:
    name: Verify SKILLS-INDEX and COMMANDS-INDEX are up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Check generated docs are up to date
        run: npm run docs:check-index
