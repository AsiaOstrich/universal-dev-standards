name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which paths changed to conditionally run expensive jobs
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            cli:
              - 'cli/**'

  # XSPEC-355 R3a — the check-*.sh ratchet.
  #
  # tests/scripts/check-scripts-passing.bats asserts every listed check exits 0,
  # and its header already said "if any of these start failing, it indicates a
  # real regression". It was never run by anything: `npm run test:scripts`
  # appeared only in package.json and scripts/README.md. Wiring it here is what
  # makes the ratchet real.
  #
  # The companion known-failures file is deliberately NOT run as a gate — it
  # documents current, re-measured failures, not history.
  script-ratchet:
    name: Check Script Ratchet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run check-*.sh ratchet
        run: tests/bats/bin/bats tests/scripts/check-scripts-passing.bats

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: cli

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 20
          - os: ubuntu-latest
            node-version: 22
          - os: windows-latest
            node-version: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify CLI runs
        run: node bin/uds.js --version

      - name: Verify list command
        run: node bin/uds.js list

      - name: Run unit tests
        run: npm run test:unit

  e2e:
    name: E2E Tests
    needs: changes
    if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.cli == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        run: npm run test:e2e

  translation-sync:
    name: Translation Sync Check
    runs-on: ubuntu-latest
    # Known: 144 missing-source files from past directory restructuring (tech debt)
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check translation sync
        run: |
          chmod +x ./scripts/check-translation-sync.sh
          ./scripts/check-translation-sync.sh

  cli-docs-sync:
    name: CLI-Docs Sync Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check CLI-docs sync
        run: |
          chmod +x ./scripts/check-cli-docs-sync.sh
          ./scripts/check-cli-docs-sync.sh
