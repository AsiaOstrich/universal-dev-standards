name: Bundle Parity Check

# Enforces that the npm-bundled standards (cli/bundled/) stay in sync with
# the source-of-truth .standards/ directory. See DEC-044 / XSPEC-071 / XSPEC-072.
#
# XSPEC-072 Phase 2 resolved all 57 bundle-source gaps (2026-04-20).
# This job is now a hard-fail gate.

on:
  pull_request:
    branches: [main]
    paths:
      - '.standards/**'
      - 'cli/bundled/**'
      - 'cli/scripts/prepack.mjs'
      - 'cli/scripts/check-bundle-parity.mjs'
      - 'cli/scripts/bundle-exclude.json'
      - '.github/workflows/bundle-parity.yml'
  push:
    branches: [main]
    paths:
      - '.standards/**'
      - 'cli/bundled/**'
      - 'cli/scripts/prepack.mjs'
      - 'cli/scripts/check-bundle-parity.mjs'
      - 'cli/scripts/bundle-exclude.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parity:
    name: Bundle ⇄ Source Parity
    runs-on: ubuntu-latest
    # Hard-fail since XSPEC-072 Phase 2 cleared all debt (2026-04-20).
    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Regenerate bundled/ (prepack)
        run: npm run prepack

      - name: Run bundle-parity check
        run: npm run check:bundle-parity
