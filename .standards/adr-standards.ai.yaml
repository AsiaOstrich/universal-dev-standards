# ADR Standards - AI Optimized
# Source: core/adr-standards.md

standard:
  id: adr-standards
  name: Architecture Decision Records
  description: Lightweight, version-controlled records of significant architectural decisions
  guidelines:
    - "Record significant architectural decisions with context, options, and rationale"
    - "Use standard ADR template (Context, Decision Drivers, Options, Outcome, Consequences)"
    - "Store ADRs in docs/adr/ with sequential numbering (ADR-NNN)"
    - "Never edit accepted ADRs; supersede with a new ADR instead"

  meta:
    version: "1.0.0"
    updated: "2026-03-26"
    source: core/adr-standards.md
    guide: skills/adr-assistant/guide.md
    description: Architecture Decision Records for tracking significant technical decisions

  template:
    sections:
      - name: "Status"
        values: ["Proposed", "Accepted", "Deprecated", "Superseded by ADR-NNN"]
      - name: "Date"
        format: "YYYY-MM-DD"
      - name: "Deciders"
        description: "People involved in the decision"
      - name: "Technical Story"
        description: "Related SPEC-ID, Issue, or PR"
      - name: "Context"
        description: "Technical or business context"
      - name: "Decision Drivers"
        description: "Criteria that matter most"
      - name: "Considered Options"
        min_options: 2
      - name: "Decision Outcome"
        description: "Chosen option with justification"
      - name: "Consequences"
        subsections: ["Good", "Bad", "Neutral"]
      - name: "Links"
        description: "Related ADRs, SPECs, PRs"

  status_lifecycle:
    transitions:
      - from: Proposed
        to: [Accepted]
      - from: Accepted
        to: [Deprecated, Superseded]
    terminal_states: [Deprecated, Superseded]
    rule: "Never revert Accepted to Proposed; create new ADR instead"

  storage:
    directory: "docs/adr/"
    naming: "ADR-NNN-short-description.md"
    numbering: sequential
    start: "001"

  rules:
    - id: six-month-rule
      trigger: making architectural decision
      instruction: "Write an ADR if someone might ask 'why?' in 6 months"
      priority: recommended
    - id: minimum-options
      trigger: writing ADR
      instruction: "Consider at least 2 options with pros and cons"
      priority: required
    - id: no-edit-accepted
      trigger: updating ADR
      instruction: "Never edit an accepted ADR; create a superseding ADR instead"
      priority: required
    - id: bidirectional-links
      trigger: completing ADR
      instruction: "Link ADR to related SPECs, code, and PRs bidirectionally"
      priority: recommended
    - id: write-at-decision-time
      trigger: making decision
      instruction: "Write ADR during or immediately after the decision, not weeks later"
      priority: required

  integration:
    sdd: "Reference ADRs in Technical Design section of SDD specs"
    code: "Add // See ADR-NNN comments for non-obvious patterns"
    commit: "Include ADR-NNN in commit footer for traceability"
    pr: "Reference relevant ADRs in PR descriptions"
