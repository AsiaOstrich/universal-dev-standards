# BDD (Behavior-Driven Development) — 內建預設流程
# Source: methodologies/bdd.methodology.yaml
# SPEC-FLOW-001 REQ-2

id: bdd
name: "Behavior-Driven Development"
version: "1.0.0"
description: "行為驅動開發：Discovery-Formulation-Automation-Living Docs"

stages:
  - id: discovery
    name: "Discovery — 探索需求"
    steps:
      - command: /brainstorm
        required: false
      - command: /requirement
        required: true
    gates:
      - type: warning
        run: "echo 'Ensure examples and edge cases are identified'"
        expect: exit_code_0

  - id: formulation
    name: "Formulation — 撰寫場景"
    steps:
      - command: /bdd
        required: true
    gates:
      - type: blocking
        artifact: "tests/features/*.feature"

  - id: automation
    name: "Automation — 自動化測試"
    steps:
      - command: /tdd
        required: true
      - command: /derive
        required: false
    gates:
      - type: blocking
        run: "npm test"
        expect: exit_code_0

  - id: living-documentation
    name: "Living Documentation — 活文件"
    steps:
      - command: /checkin
        required: true
      - command: /commit
        required: true
    gates:
      - type: blocking
        run: "npm test"
        expect: exit_code_0

config:
  enforcement: suggest
  allow_skip_optional: true
  state_persistence: true
  gate_timeout: 30
