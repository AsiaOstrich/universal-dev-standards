# Unit Testing - AI Optimized Option
# Parent: testing

id: unit-testing
meta:
  parent: testing
  version: "1.0.0"
  description: Testing individual functions and methods in isolation

characteristics:
  scope: Single function or method
  speed: "<100ms per test"
  isolation: Complete (no external dependencies)
  pyramid_percentage: 70%

rules:
  - id: test-one-thing
    trigger: writing unit test
    instruction: Each test should verify one behavior
    priority: required

  - id: isolate-dependencies
    trigger: testing with dependencies
    instruction: Use stubs/mocks for external dependencies
    priority: required

  - id: fast-execution
    trigger: writing unit test
    instruction: Unit tests must run in under 100ms
    priority: required

  - id: naming-convention
    trigger: naming unit test
    instruction: Use pattern methodName_scenario_expectedResult
    priority: recommended
    examples:
      good:
        - "calculateTotal_withEmptyCart_returnsZero"
        - "validateEmail_withInvalidFormat_returnsFalse"
      bad:
        - "test1"
        - "testCalculate"

  - id: arrange-act-assert
    trigger: structuring test
    instruction: Follow AAA pattern in test body
    priority: required

structure:
  pattern: "Arrange-Act-Assert"
  example: |
    # Pseudocode (language-agnostic)
    # Arrange
    calculator = new Calculator()
    input = 5

    # Act
    result = calculator.square(input)

    # Assert
    assert result == 25

ai_instruction: |
  Read uds.project.yaml to identify the ecosystem, then translate the pseudocode
  above into the target language using its standard test framework and assertion library.
  Never hardcode examples for a fixed set of languages.

when_to_write:
  - Testing pure functions
  - Testing business logic
  - Testing data transformations
  - Testing validation rules
  - Testing edge cases and boundaries

when_not_to_write:
  - Testing framework code
  - Testing trivial getters/setters
  - Testing third-party libraries

coverage_target: "80% of business logic"

tools_note: |
  Select test framework based on the detected ecosystem in uds.project.yaml.
  Do not assume a specific language or framework.
