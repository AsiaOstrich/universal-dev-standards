# Performance Standards (AI-Optimized)
# Source: core/performance-standards.md
# Guide: core/guides/performance-guide.md
# Version: 1.2.0

iso25010_efficiency:
  time_behavior: "Response time, throughput"
  resource_utilization: "CPU, memory, disk, network"
  capacity: "Maximum limits meeting requirements"

requirements:
  template: "The system SHALL respond to API requests within [target]ms for p[percentile] under [load] conditions"
  targets:
    ecommerce: {p95: "<200ms", throughput: "1000+ rps", availability: "99.9%"}
    internal: {p95: "<500ms", throughput: "100+ rps", availability: "99.5%"}
    realtime: {p99: "<50ms", throughput: "10K+ rps", availability: "99.99%"}

testing:
  types:
    load: {purpose: "Verify expected load", duration: "10-60 min", load: "normal-peak"}
    stress: {purpose: "Find breaking point", duration: "until failure", load: "beyond capacity"}
    soak: {purpose: "Find leaks", duration: "4-72 hours", load: "sustained normal"}
    spike: {purpose: "Sudden changes", duration: "short bursts", load: "sudden increase"}
    scalability: {purpose: "Scaling behavior", load: "incrementally increasing"}
  tools:
    load: [k6, JMeter, Gatling, Locust]
    frontend: [Lighthouse, WebPageTest]
    apm: [Datadog, New_Relic, Dynatrace]
  frequency:
    dev: "Unit perf every commit"
    staging: "Load/stress every release"
    prod: "Load monthly, stress quarterly"

metrics:
  red_method: # Request-oriented
    rate: "Requests per second"
    errors: "Error rate % (<0.1%)"
    duration: "Response time distribution"
  use_method: # Resource-oriented
    utilization: "% busy (warn >70%, crit >90%)"
    saturation: "Queue length"
    errors: "Error count"
  golden_signals: # Google SRE
    latency: "Track p50, p90, p95, p99"
    traffic: "Requests/transactions per second"
    errors: "Explicit + implicit + policy violations"
    saturation: "CPU, memory, disk, network"
  percentiles:
    p50: "Typical user experience"
    p95: "SLA threshold (common)"
    p99: "Worst case for most users"

optimization:
  principles:
    - "MEASURE FIRST (avoid premature optimization)"
    - "IDENTIFY BOTTLENECK (Amdahl's Law)"
    - "OPTIMIZE RIGHT LEVEL: Algorithm > Architecture > Database > Code > Infrastructure"
    - "VERIFY IMPROVEMENT"
  techniques:
    algorithm: {impact: very_high, example: "O(n²) → O(n log n)"}
    architecture: {impact: high, example: "Caching, async, load balancing"}
    database: {impact: high, example: "Indexing, query optimization, connection pooling"}
    code: {impact: medium, example: "Lazy loading, batching, memoization"}

database:
  query_issues:
    full_table_scan: "Add indexes"
    n_plus_1: "Eager loading/JOINs"
    large_results: "Pagination"
  connection_pool:
    min: "5-10"
    max: "20-100"
    idle_timeout: "10-30 min"

api:
  optimization:
    - "Pagination (default 20-100 items)"
    - "Field selection (?fields=id,name)"
    - "Compression (gzip/brotli >1KB)"
    - "Async for long operations (return 202)"
  rate_limits:
    login: "5/15min"
    authenticated: "1000/hour"
    unauthenticated: "100/hour"

frontend:
  core_web_vitals:
    LCP: "<2.5s"
    INP: "<200ms"
    CLS: "<0.1"
  techniques: [lazy_loading, code_splitting, image_optimization, CDN]
  budget:
    total: "500KB"
    javascript: "200KB"
    lighthouse_perf: "90+"

caching:
  levels: [browser, CDN, application, database]
  strategies:
    ttl_based: "Static content, read-heavy"
    event_based: "Real-time data, consistency critical"
    stale_while_revalidate: "High availability"
  headers:
    static: "public, max-age=31536000, immutable"
    api_short: "private, max-age=60, stale-while-revalidate=300"
    no_cache: "no-store, no-cache, must-revalidate"

monitoring:
  components:
    application: "APM (response time, traces)"
    infrastructure: "Prometheus/Grafana (CPU, memory)"
    database: "Slow query log, connections"
    frontend: "RUM (Core Web Vitals)"
  alerts:
    p95_response: {warn: ">200ms", crit: ">500ms"}
    error_rate: {warn: ">0.1%", crit: ">1%"}
    cpu: {warn: ">70%", crit: ">90%"}
    memory: {warn: ">80%", crit: ">95%"}

capacity_planning:
  process: [collect_data, analyze_trends, forecast, plan, execute]
  scaling:
    vertical: {pros: "Simple", cons: "Hardware limits", when: "Quick fix"}
    horizontal: {pros: "No limit, fault tolerant", cons: "Complexity", when: "Production"}
    auto: {pros: "Cost-effective", cons: "Warm-up time", when: "Variable load"}
  thresholds:
    cpu: "Plan at 70%"
    memory: "Plan at 80%"
    storage: "Plan at 70%"

# XSPEC-286: Migration Non-Functional Parity (axis 6 of XSPEC-284 completeness matrix)
# Covers "function correct, data correct, but RUNS differently" omissions in a legacy rewrite.
# Differential oracle: legacy is the baseline, "no regression beyond declared tolerance" is pass.
migration_non_functional_parity:
  axis: "6 (non-functional) of XSPEC-284 migration completeness matrix"
  principle: "Legacy is the baseline; declared tolerance, not absolute target. Divergence self-reports."
  why_gap: "General baseline/drift compares a version to its OWN prior baseline, not new-vs-legacy. Per-request and behavior-snapshot parity both pass while the system silently runs slower / loses a lock semantic."
  derive: # R3 mechanized baseline capture
    sources:
      key_routes: "p50/p95/p99 latency per critical path"
      hot_queries: "per-query latency, rows scanned (slow-query log)"
      background_jobs: "job duration, throughput records/min"
      connection_pool: "min/max connections, idle/connection timeout"
      timeout_ratelimit: "per-endpoint timeout, requests/min, burst"
      transaction_config: "isolation level"
    note: "Captured set is both the regression baseline AND the resource/limit parity checklist."
  regression_gate: # R1 performance regression differential
    oracle: "measure new-system path, compare vs legacy baseline within declared tolerance"
    default_tolerance:
      p50_latency: "<= +10% vs legacy"
      p95_latency: "<= +15% vs legacy"
      p99_latency: "<= +20% vs legacy"
      throughput: "<= -10% decrease vs legacy"
    per_path_configurable: true
    rollout: "shadow (measure-only) first to calibrate per-path tolerance, then promote to blocking"
    gate_timing: [pre-UAT, post-cutover]
  concurrency_isolation: # R2
    method: "drive a race with concurrent stress, then assert DOMAIN INVARIANTS (not one-at-a-time output checks)"
    invariants:
      conservation: "SUM(balance) unchanged after N concurrent transfers"
      uniqueness: "no duplicate sequence number under concurrent allocation"
      no_lost_update: "committed write not silently replaced"
      ordering: "events applied in guaranteed order under concurrency"
    blocks_on: "isolation downgrade (e.g. SERIALIZABLE -> READ COMMITTED, removed row lock)"
    boundary: "state-transition legality and temporal invariants owned by XSPEC-287 (axis 8); concurrency race owned here (axis 6)"
    gate_timing: [pre-UAT]
  resource_limit_parity: # R4
    checklist: [request_timeout, rate_limit, connection_pool, batch_size, transaction_isolation]
    rule: "each item matched OR has a declared justified delta; undeclared delta blocks cutover"
  completeness_declaration:
    derive: "Step1 mechanized baseline"
    oracle: "Step2 regression differential + Step3 invariant assertions"
    gate_timing: "pre-UAT + post-cutover"
    reuse: "general baseline/drift + observability-assistant measurement; adds only migration before/after + concurrency-isolation semantics"
