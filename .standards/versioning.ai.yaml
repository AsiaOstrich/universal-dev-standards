# Semantic Versioning Standard - AI Optimized (v2 Dual-Layer)
# Source: core/versioning.md

standard:
  id: versioning
  name: Semantic Versioning Standard
  description: Semantic Versioning (SemVer) for software releases
  guidelines:
    - "Follow SemVer: MAJOR.MINOR.PATCH"
    - "Increment MAJOR for breaking changes"
    - "Increment MINOR for new features"
    - "Increment PATCH for bug fixes"
    - "Use pre-release identifiers (alpha, beta, rc)"

  meta:
    version: "2.1.0"
    updated: "2026-06-24"
    source: core/versioning.md
    description: Semantic Versioning (SemVer) for software releases

  format:
    template: "MAJOR.MINOR.PATCH[-PRERELEASE][+BUILD]"
    examples:
      - "2.3.1"
      - "1.0.0-alpha.1"
      - "3.2.0-beta.2+20250112"

  components:
    major:
      purpose: Breaking changes
      when_to_increment:
        - Incompatible API changes
        - Removing deprecated features
        - Major architecture changes
      guidelines:
        - Reset MINOR and PATCH to 0
        - Document migration guide
        - Provide deprecation warnings in previous MINOR
    minor:
      purpose: New features
      when_to_increment:
        - Adding backward-compatible features
        - Deprecating features (not removing)
        - Substantial internal improvements
      guidelines:
        - Reset PATCH to 0
        - Existing functionality unchanged
        - New features are opt-in
    patch:
      purpose: Bug fixes
      when_to_increment:
        - Bug fixes (no new features)
        - Security patches
        - Documentation corrections
        - Internal refactoring (no API changes)
      guidelines:
        - No new functionality
        - No API changes
        - Safe to update immediately

  prerelease:
    identifiers:
      - id: alpha
        purpose: Early testing
        stability: Unstable
        audience: Internal team
      - id: beta
        purpose: Feature complete
        stability: Mostly stable
        audience: Early adopters
      - id: rc
        purpose: Final testing (release candidate)
        stability: Stable
        audience: Beta testers
    ordering: "alpha < beta < rc < stable"

  initial_development:
    version_0:
      description: Major version 0 indicates development phase
      guidelines:
        - API may change frequently
        - Breaking changes allowed in MINOR versions
        - Move to 1.0.0 when API is stable

  # API versioning strategies, the backward-compatibility checklist, deprecation
  # timeline + per-tier periods, and the migration-guide template were moved to
  # their single sources of truth (XSPEC-298 R8, UDS #126):
  #   - api-design.ai.yaml  → versioning_strategies.backward_compatibility
  #   - deprecation-standards.ai.yaml → api_deprecation.minimum_period_by_tier
  cross_references:
    api_contract: "core/api-design-standards.md#api-versioning-strategies"
    deprecation_lifecycle: "core/deprecation-standards.md#api-deprecation"

  release_process:
    phases:
      - phase: 1
        name: Pre-release Diagnosis
        mandatory: true
        check_items:
          - System tool versions
          - Required drivers
          - Disk space
          - Database connectivity
          - Application version
          - Configuration completeness
      - phase: 2
        name: Environment Preparation
        purpose: Install missing tools and drivers
      - phase: 3
        name: Package Generation
        naming: "{PROJECT}-upgrade-v{VERSION}-{DATE}.tar.gz"
      - phase: 4
        name: Deployment Execution
        steps:
          - Upload upgrade package
          - Extract package
          - Dry-run test (strongly recommended)
          - Actual upgrade
      - phase: 5
        name: Post-release Verification
        check_items:
          - Service running normally
          - API returns correct version
          - No fatal errors in logs
          - Functionality verification passed

  rules:
    - id: semver-compliance
      trigger: releasing new version
      instruction: Follow Semantic Versioning format strictly
      priority: required
    - id: deprecation-warning
      trigger: planning breaking change
      instruction: Add deprecation warning N-1 version before removal
      priority: required
    - id: migration-guide
      trigger: releasing MAJOR version
      instruction: Document migration guide with before/after examples
      priority: required
    - id: changelog-update
      trigger: releasing any version
      instruction: Update CHANGELOG.md with all notable changes
      priority: required
    - id: pre-release-diagnosis
      trigger: starting release process
      instruction: Must not skip diagnosis phase
      priority: required
    - id: dry-run-test
      trigger: deploying upgrade
      instruction: Must not skip dry-run test
      priority: required

physical_spec:
  type: custom_script
  validator:
    command: >
      node -e 'try { require("./package.json").version ? process.exit(0) : process.exit(1) } catch { process.exit(1) }'
    rule: "package_version_exists"
